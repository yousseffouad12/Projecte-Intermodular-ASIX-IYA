<svg width="780" height="160" viewBox="0 0 780 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Courier New', monospace; }
  </style>
  <rect width="780" height="160" fill="#0a0e14"/>
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,255,136,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="780" height="160" fill="url(#grid)"/>

  <!-- INTERNET / ATTACKER zone -->
  <rect x="20" y="30" width="110" height="100" rx="6" fill="rgba(255,68,68,0.06)" stroke="rgba(255,68,68,0.4)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="75" y="50" text-anchor="middle" font-size="9" fill="#ff4444" letter-spacing="2" opacity="0.7">INTERNET</text>
  <text x="75" y="92" text-anchor="middle" font-size="26" fill="rgba(255,68,68,0.3)">☠</text>
  <text x="75" y="115" text-anchor="middle" font-size="8" fill="rgba(255,68,68,0.5)">Kali Linux</text>
  <text x="75" y="126" text-anchor="middle" font-size="7" fill="rgba(255,68,68,0.35)">10.93.255.105</text>

  <!-- Attack arrow dashed red -->
  <line x1="132" y1="80" x2="190" y2="80" stroke="rgba(255,68,68,0.7)" stroke-width="1.5" stroke-dasharray="5 3"/>
  <polygon points="190,75 200,80 190,85" fill="rgba(255,68,68,0.7)"/>
  <text x="161" y="72" text-anchor="middle" font-size="7" fill="rgba(255,68,68,0.7)">ATTACK</text>

  <!-- WAN box -->
  <rect x="200" y="55" width="80" height="50" rx="4" fill="rgba(255,68,68,0.08)" stroke="rgba(255,68,68,0.5)" stroke-width="1"/>
  <text x="240" y="75" text-anchor="middle" font-size="9" fill="rgba(255,68,68,0.9)" font-weight="bold">WAN</text>
  <text x="240" y="87" text-anchor="middle" font-size="7" fill="rgba(255,68,68,0.5)">em0</text>
  <text x="240" y="98" text-anchor="middle" font-size="6.5" fill="rgba(255,68,68,0.4)">10.93.255.38</text>

  <!-- BLOCKED label -->
  <rect x="192" y="38" width="48" height="14" rx="3" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.4)" stroke-width="0.8"/>
  <text x="216" y="48" text-anchor="middle" font-size="7" fill="#ff4444">✕ BLOCKED</text>

  <!-- pfSense+Suricata central -->
  <rect x="302" y="20" width="186" height="120" rx="8" fill="rgba(68,136,255,0.08)" stroke="rgba(68,136,255,0.6)" stroke-width="1.5"/>
  <path d="M395 34 L410 41 L410 61 Q410 74 395 81 Q380 74 380 61 L380 41 Z" fill="rgba(68,136,255,0.2)" stroke="rgba(68,136,255,0.7)" stroke-width="1"/>
  <text x="395" y="62" text-anchor="middle" font-size="9" fill="rgba(68,136,255,0.9)">✓</text>
  <text x="395" y="100" text-anchor="middle" font-size="10" fill="rgba(68,136,255,0.9)" font-weight="bold">pfSense</text>
  <text x="395" y="113" text-anchor="middle" font-size="8" fill="rgba(68,136,255,0.6)">+ Suricata 7.0.8</text>
  <text x="395" y="126" text-anchor="middle" font-size="7" fill="rgba(68,136,255,0.4)">LEGACY MODE IPS</text>

  <!-- Arrow WAN to pfSense -->
  <line x1="282" y1="80" x2="300" y2="80" stroke="rgba(68,136,255,0.5)" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Arrow pfSense to LAN -->
  <line x1="490" y1="80" x2="510" y2="80" stroke="rgba(0,255,136,0.7)" stroke-width="1.5"/>
  <polygon points="510,75 520,80 510,85" fill="rgba(0,255,136,0.7)"/>
  <text x="500" y="72" text-anchor="middle" font-size="7" fill="rgba(0,255,136,0.6)">CLEAN</text>

  <!-- LAN box -->
  <rect x="522" y="55" width="80" height="50" rx="4" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.4)" stroke-width="1"/>
  <text x="562" y="75" text-anchor="middle" font-size="9" fill="rgba(0,255,136,0.8)" font-weight="bold">LAN</text>
  <text x="562" y="87" text-anchor="middle" font-size="7" fill="rgba(0,255,136,0.5)">em1</text>
  <text x="562" y="98" text-anchor="middle" font-size="6.5" fill="rgba(0,255,136,0.4)">192.168.10.1</text>

  <!-- Arrow LAN to clients -->
  <line x1="604" y1="80" x2="622" y2="80" stroke="rgba(0,255,136,0.5)" stroke-width="1.5"/>
  <polygon points="622,75 632,80 622,85" fill="rgba(0,255,136,0.5)"/>

  <!-- PROTECTED zone -->
  <rect x="634" y="30" width="130" height="100" rx="6" fill="rgba(0,255,136,0.04)" stroke="rgba(0,255,136,0.3)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="699" y="50" text-anchor="middle" font-size="9" fill="rgba(0,255,136,0.5)" letter-spacing="2">PROTECTED</text>
  <rect x="648" y="60" width="34" height="20" rx="2" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.3)" stroke-width="0.8"/>
  <text x="665" y="73" text-anchor="middle" font-size="6.5" fill="rgba(0,255,136,0.6)">CLIENT</text>
  <rect x="689" y="60" width="34" height="20" rx="2" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.3)" stroke-width="0.8"/>
  <text x="706" y="73" text-anchor="middle" font-size="6.5" fill="rgba(0,255,136,0.6)">CLIENT</text>
  <rect x="730" y="60" width="28" height="20" rx="2" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.3)" stroke-width="0.8"/>
  <text x="744" y="73" text-anchor="middle" font-size="6.5" fill="rgba(0,255,136,0.6)">CLIENT</text>
  <text x="699" y="118" text-anchor="middle" font-size="7" fill="rgba(0,255,136,0.4)">192.168.10.x/24</text>
</svg>
